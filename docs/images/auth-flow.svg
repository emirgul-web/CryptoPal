<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430" role="img" aria-labelledby="title desc">
  <title id="title">Authentication Flow</title>
  <desc id="desc">Authentication and token flow using PostgreSQL and Redis.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.title{font:700 22px Arial;fill:#0f172a}.text{font:500 15px Arial;fill:#334155}.small{font:500 13px Arial;fill:#64748b}.arrow{stroke:#16a34a;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect class="bg" width="1000" height="430" rx="18"/>
  <text class="title" x="40" y="54">Register / Login Token Flow</text>
  <rect class="box" x="50" y="120" width="170" height="95" rx="12"/>
  <text class="title" x="82" y="158">User</text>
  <text class="text" x="82" y="186">email + password</text>
  <rect class="box" x="310" y="105" width="210" height="125" rx="12"/>
  <text class="title" x="343" y="145">AuthController</text>
  <text class="text" x="343" y="176">/register</text>
  <text class="text" x="343" y="202">/login</text>
  <rect class="box" x="615" y="70" width="220" height="115" rx="12"/>
  <text class="title" x="650" y="110">PostgreSQL</text>
  <text class="text" x="650" y="140">user credentials</text>
  <text class="text" x="650" y="164">wallet balance</text>
  <rect class="box" x="615" y="250" width="220" height="105" rx="12"/>
  <text class="title" x="680" y="290">Redis</text>
  <text class="text" x="650" y="320">session:token -&gt; userId</text>
  <path class="arrow" d="M220 168 H300"/>
  <path class="arrow" d="M520 132 H605"/>
  <text class="small" x="535" y="116">save/check user</text>
  <path class="arrow" d="M520 195 C575 210 575 280 605 300"/>
  <text class="small" x="530" y="255">create session</text>
  <path class="arrow" d="M605 315 C455 375 260 310 185 218"/>
  <text class="small" x="332" y="352">return token to frontend</text>
</svg>
