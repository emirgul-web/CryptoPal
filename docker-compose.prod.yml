services:
  backend:
    build:
      context: ./Kasa
    container_name: cryptopal-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://cryptopal-postgres:5432/cryptopal
      SPRING_DATASOURCE_USERNAME: cryptopal
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_DATA_REDIS_HOST: cryptopal-redis
      SPRING_DATA_REDIS_PORT: 6379

      CRYPTOPAL_SESSION_TTL_MINUTES: 1440
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-lite-latest}
    networks:
      - cryptopal-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: cryptopal-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cryptopal-network

networks:
  cryptopal-network:
    external: true