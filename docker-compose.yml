services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptopal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cryptopal
      POSTGRES_USER: cryptopal
      POSTGRES_PASSWORD: cryptopal_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cryptopal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./Kasa
    container_name: cryptopal-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cryptopal
      - SPRING_DATASOURCE_USERNAME=cryptopal
      - SPRING_DATASOURCE_PASSWORD=cryptopal_password
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: cryptopal-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: